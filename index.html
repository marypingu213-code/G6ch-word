<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生字自學大廳 - 整合實驗室版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* --- 原有大廳樣式 --- */
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --accent-yellow: #ffff00;
            --btn-text: #ffffff;
            --lobby-btn-bg: #333333;
            --lobby-btn-border: #555555;
            --lobby-title: #ffffff;
            --done-btn-bg: #444444;
            /* 實驗室專用變數 */
            --lab-bg: #f0f4f7;
            --nav-bg: #2c3e50;
            --radical-color: #3498db;
            --base-text: #8e44ad;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* QR Code 與大廳基礎布局 */
        #qrcode-container {
            background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 10px;
            margin: 20px 0; text-align: center;
        }
        #qrcode-container p { color: #000; font-weight: bold; margin: 5px; }

        #lobby { width: 100%; max-width: 1400px; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .lobby-title { color: var(--lobby-title); font-size: 3rem; margin-bottom: 30px; text-align: center;}
        
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; width: 100%; padding: 20px; box-sizing: border-box;
        }
        .unit-btn {
            background: var(--lobby-btn-bg);
            border: 2px solid var(--lobby-btn-border);
            color: #ffffff; font-size: 2.2rem; padding: 40px 15px;
            border-radius: 15px; cursor: pointer; text-align: center;
            transition: all 0.3s ease;
        }
        .unit-btn:hover { transform: translateY(-5px); background-color: #444; border-color: var(--accent-yellow); }
        /* 實驗室按鈕特殊色 */
        .lab-btn { border-color: #3498db; background: #1a2a3a; }

        /* 內容區通用樣式 */
        #lesson-area, #lab-area { display: none; width: 100%; min-height: 100vh; flex-direction: column; background: var(--bg-dark); }
        .back-btn {
            background: #444; color: white; border: 2px solid #666;
            padding: 15px 35px; font-size: 1.6rem; border-radius: 10px;
            margin: 20px; cursor: pointer; align-self: flex-start;
        }

        /* --- 實驗室專屬樣式 (嵌入大廳後微調) --- */
        #lab-area { background-color: var(--lab-bg); color: #333; overflow-y: auto; }
        .lab-nav { display: flex; justify-content: center; gap: 8px; padding: 10px; background: var(--nav-bg); flex-wrap: wrap; }
        .nav-btn { padding: 8px 15px; font-size: 18px; border-radius: 10px; border: none; background: #5d6d7e; color: white; cursor: pointer; }
        .nav-btn.active { background: #27ae60; font-weight: bold; }
        
        #combine-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .slot-container { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        .slot {
            width: 100px; height: 100px; border: 4px dashed #bdc3c7; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; font-weight: bold; color: #bdc3c7; background: white;
        }
        .slot.filled { border-style: solid; border-color: var(--radical-color); color: var(--radical-color); }
        .slot.base-fixed { border-style: solid; border-color: var(--base-text); color: var(--base-text); }
        
        #result-display { font-size: 120px; font-weight: 900; color: #2c3e50; min-height: 140px; }
        .selection-area { background: #dfe6e9; padding: 20px; border-radius: 30px 30px 0 0; }
        .part-btn { width: 70px; height: 70px; font-size: 30px; font-weight: bold; margin: 5px; background: white; border: none; border-radius: 15px; box-shadow: 0 4px #b2bec3; cursor: pointer; border-top: 4px solid var(--radical-color); }
        
        /* 課程卡片樣式 */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 20px; }
        .vocab-card { background: var(--card-dark); border: 2px solid #444; border-radius: 20px; padding: 30px; text-align: center; position: relative; }
        .word { font-size: 4rem; color: var(--accent-yellow); }
        .emoji { font-size: 5rem; }
    </style>
</head>
<body>

    <div id="qrcode-container">
        <p>📱 掃描開始學習</p>
        <div id="qrcode"></div>
    </div>

    <div id="lobby">
        <h1 class="lobby-title">📚 課文自學大廳</h1>
        <div class="lobby-grid">
            <div class="unit-btn lab-btn" onclick="openLab()">🧪 文字合體<br><small>部件實驗室</small></div>
            <div class="unit-btn" onclick="loadLesson(1)">第一課<br><small>風中騎士</small></div>
            <div class="unit-btn" onclick="loadLesson(2)">第二課<br><small>達駭黑熊</small></div>
            <div class="unit-btn" onclick="loadLesson(3)">第三課<br><small>楊氏之子</small></div>
            <div class="unit-btn" onclick="loadLesson(4)">第四課<br><small>談夢想</small></div>
            <div class="unit-btn" onclick="loadLesson(5)">第五課<br><small>蒂烈娜</small></div>
        </div>
    </div>

    <div id="lesson-area">
        <button class="back-btn" onclick="goBack()">🏠 回大廳</button>
        <h1 id="lesson-title" style="text-align:center; color:var(--accent-yellow)"></h1>
        <div class="vocab-grid" id="vocab-grid"></div>
    </div>

    <div id="lab-area">
        <button class="back-btn" onclick="goBack()" style="background:#2c3e50">🏠 回大廳</button>
        <nav class="lab-nav">
            <button id="nav-mei" class="nav-btn" onclick="switchLevel('mei')">每 系列</button>
            <button id="nav-qing" class="nav-btn" onclick="switchLevel('qing')">青 系列</button>
            <button id="nav-guo" class="nav-btn" onclick="switchLevel('guo')">過 系列</button>
            <button id="nav-ba" class="nav-btn" onclick="switchLevel('ba')">巴 系列</button>
            <button id="nav-dui" class="nav-btn" onclick="switchLevel('dui')">兌 系列</button>
            <button id="nav-zhui" class="nav-btn" onclick="switchLevel('zhui')">隹 系列</button>
        </nav>
        <div id="combine-zone">
            <div id="result-emoji" style="font-size: 60px;"></div>
            <div class="slot-container">
                <div id="slot-radical" class="slot">部首</div>
                <div style="font-size: 30px; color: #bdc3c7;">+</div>
                <div id="slot-base" class="slot base-fixed">?</div>
            </div>
            <div id="result-display"></div>
            <div id="info-bar" style="font-size: 20px; font-weight: bold; color: #555; margin-top:10px;"></div>
        </div>
        <div class="selection-area">
            <div id="radical-btns" style="text-align: center; margin-bottom: 10px;"></div>
            <button onclick="clearRadical()" style="width:100%; padding:10px; border-radius:10px; border:none; background:#95a5a6; color:white;">🔄 清除部首</button>
        </div>
    </div>

    <script>
        // --- 核心邏輯控制 ---
        const lobby = document.getElementById('lobby');
        const lessonArea = document.getElementById('lesson-area');
        const labArea = document.getElementById('lab-area');
        const qrcodeContainer = document.getElementById('qrcode-container');

        function goBack() {
            lobby.style.display = 'flex';
            lessonArea.style.display = 'none';
            labArea.style.display = 'none';
            qrcodeContainer.style.display = 'block';
            window.speechSynthesis.cancel();
        }

        // --- 課程功能 ---
        const lessons = { /* 此處保留您原本 1-5 課的 data ... */
            1: { title: "第一課：風中騎士", data: [{ word: "矛盾", emoji: "🛡️" }, { word: "娛樂", emoji: "🎡" }, { word: "帥", emoji: "😎" }, { word: "摔跤", emoji: "💥" }, { word: "厚", emoji: "📚" }, { word: "提供", emoji: "🤲" }, { word: "諄諄教誨", emoji: "👨‍🏫", tts: "諄諄教繪" }, { word: "竅門", emoji: "🔑" }, { word: "呼嘯", emoji: "🌬️" }, { word: "叮嚀", emoji: "🗣️" }, { word: "廟", emoji: "⛩️" }, { word: "尿尿", emoji: "🚽" }, { word: "煞車", emoji: "🛑", tts: "沙車" }, { word: "霎時", emoji: "⚡" }, { word: "疤", emoji: "🩹" }, { word: "尿臊味", emoji: "👃", tts: "尿騷味" }] },
            2: { title: "第二課：達駭黑熊", data: [{ word: "獵人", emoji: "🏹" }, { word: "尚未", emoji: "⏳" }, { word: "包括", emoji: "📦" }, { word: "糞便", emoji: "💩" }, { word: "獵寮", emoji: "⛺", tts: "獵聊" }, { word: "狩獵", emoji: "🐺" }, { word: "逼迫", emoji: "😖" }, { word: "威脅", emoji: "😨" }, { word: "殺害", emoji: "❌" }, { word: "遵照", emoji: "🫡" }, { word: "骸骨", emoji: "💀", tts: "孩骨" }, { word: "窩在", emoji: "🧶" }, { word: "杉木", emoji: "🌲" }, { word: "小心翼翼", emoji: "🤫" }, { word: "奄奄一息", emoji: "🥀" }] },
            3: { title: "第三課：楊氏之子", data: [{ word: "楊梅", emoji: "🍒" }, { word: "選", emoji: "🗳️" }, { word: "軼聞", emoji: "📖", tts: "易聞" }, { word: "膾炙人口", emoji: "🌟", tts: "快炙人口" }, { word: "古典文學", emoji: "📜" }, { word: "寓意", emoji: "💡" }, { word: "邏輯", emoji: "🧠" }, { word: "例子", emoji: "📝" }, { word: "敏捷", emoji: "🏃" }] },
            4: { title: "第四課：談夢想", data: [{ word: "蜿蜒", emoji: "〰️" }, { word: "荊棘", emoji: "🌵" }, { word: "嚮往", emoji: "💭" }, { word: "逐夢", emoji: "🏃‍♂️" }, { word: "步伐", emoji: "👣", tts: "步發" }, { word: "領域", emoji: "🏗️" }, { word: "楷模", emoji: "🏆" }, { word: "遺憾", emoji: "😞" }, { word: "岔口", emoji: "🛤️" }, { word: "契機", emoji: "✨" }, { word: "名聞遐邇", emoji: "🌏" }, { word: "奠定", emoji: "🧱" }, { word: "屹立不搖", emoji: "🗼" }, { word: "氣餒", emoji: "📉" }, { word: "猶豫", emoji: "🤔" }] },
            5: { title: "第五課：蒂烈娜", data: [{ word: "山巒", emoji: "⛰️" }, { word: "尾鰭", emoji: "🐟" }, { word: "堅韌", emoji: "🦾" }, { word: "鞭子", emoji: "➰" }, { word: "蒼黑", emoji: "⬛" }, { word: "鯝魚", emoji: "🐟" }, { word: "恰巧", emoji: "📍" }, { word: "不偏不倚", emoji: "🎯", tts: "不偏不乙" }, { word: "頸子", emoji: "🦒" }, { word: "強勁", emoji: "💨" }, { word: "洶湧", emoji: "🌊" }, { word: "急湍", emoji: "🏞️" }, { word: "兇猛", emoji: "🐯" }] }
        };

        function loadLesson(id) {
            const lesson = lessons[id];
            lobby.style.display = 'none';
            lessonArea.style.display = 'flex';
            qrcodeContainer.style.display = 'none';
            document.getElementById('lesson-title').innerText = lesson.title;
            const grid = document.getElementById('vocab-grid');
            grid.innerHTML = '';
            lesson.data.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.onclick = () => speak(item.tts || item.word);
                card.innerHTML = `<div class="emoji">${item.emoji}</div><div class="word">${item.word}</div>`;
                grid.appendChild(card);
            });
            speak(lesson.title);
        }

        // --- 實驗室功能 ---
        const labLevels = {
            mei: { title: "每", base: "每", results: { "氵": { char: "海", emo: "🌊", msg: "大海的海" }, "忄": { char: "悔", emo: "😢", msg: "後悔的悔" }, "艹": { char: "莓", emo: "🍓", msg: "草莓的莓" }, "木": { char: "梅", emo: "🌸", msg: "梅花的梅" } } },
            qing: { title: "青", base: "青", results: { "氵": { char: "清", emo: "🥤", msg: "清水的清" }, "忄": { char: "情", emo: "❤️", msg: "心情的情" }, "日": { char: "晴", emo: "☀️", msg: "晴天的晴" }, "目": { char: "睛", emo: "👀", msg: "眼睛的睛" }, "言": { char: "請", emo: "🙏", msg: "請問的請" }, "犭": { char: "猜", emo: "❓", msg: "猜一猜的猜" } } },
            guo: { title: "過", base: "咼", results: { "辶": { char: "過", emo: "🏃", msg: "路過的過" }, "穴": { char: "窩", emo: "🪺", msg: "鳥窩的窩" }, "釒": { char: "鍋", emo: "🍲", msg: "火鍋的鍋" } } },
            ba: { title: "巴", base: "巴", results: { "父": { char: "爸", emo: "👨", msg: "爸爸的爸" }, "口": { char: "吧", emo: "💬", msg: "好吧的吧" }, "扌": { char: "把", emo: "🖐️", msg: "拿東西的把" }, "⺼": { char: "肥", emo: "🐷", msg: "肥肉的肥" } } },
            dui: { title: "兌", base: "兌", results: { "言": { char: "說", emo: "🗣️", msg: "說話的說" }, "忄": { char: "悅", emo: "🥰", msg: "開心的悅" }, "⺼": { char: "脫", emo: "👕", msg: "脫衣服的脫" }, "釒": { char: "銳", emo: "🔪", msg: "尖銳的銳" } } },
            zhui: { title: "隹", base: "隹", results: { "扌": { char: "推", emo: "👐", msg: "推門的推" }, "土": { char: "堆", emo: "⛰️", msg: "土堆、堆積的堆" }, "言": { char: "誰", emo: "🤔", msg: "你是誰的誰" }, "糹": { char: "維", emo: "🧬", msg: "維護、纖維的維" }, "辶": { char: "進", emo: "🚪", msg: "進門、前進的進" } } }
        };

        let currentLabKey = 'mei';

        function openLab() {
            lobby.style.display = 'none';
            labArea.style.display = 'flex';
            qrcodeContainer.style.display = 'none';
            switchLevel('mei');
        }

        function switchLevel(key) {
            currentLabKey = key;
            const data = labLevels[key];
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === 'nav-'+key));
            document.getElementById('slot-base').innerText = data.base;
            const radContainer = document.getElementById('radical-btns');
            radContainer.innerHTML = Object.keys(data.results).map(r => 
                `<button class="part-btn" onclick="selectRadical('${r}')">${r}</button>`
            ).join('');
            clearRadical();
            speak("進入文字實驗室，目前是" + data.title + "系列");
        }

        function selectRadical(r) {
            const rSlot = document.getElementById('slot-radical');
            const res = labLevels[currentLabKey].results[r];
            rSlot.innerText = r;
            rSlot.classList.add('filled');
            if (res) {
                document.getElementById('result-display').innerText = res.char;
                document.getElementById('result-emoji').innerText = res.emo;
                document.getElementById('info-bar').innerText = res.msg;
                speak(r + "加" + labLevels[currentLabKey].base + "，變成" + res.char + "。" + res.msg);
            }
        }

        function clearRadical() {
            document.getElementById('slot-radical').innerText = "部首";
            document.getElementById('slot-radical').classList.remove('filled');
            document.getElementById('result-display').innerText = "";
            document.getElementById('result-emoji').innerText = "";
            document.getElementById('info-bar').innerText = "點選部首來組合";
        }

        // --- 公用發音 ---
        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.7;
            window.speechSynthesis.speak(utterance);
        }

        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 100, height: 100 });
    </script>
</body>
</html>
