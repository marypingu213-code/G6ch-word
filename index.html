<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生字自學大廳 - 完整課程版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --accent-yellow: #ffff00;
            --btn-text: #ffffff;
            --lobby-btn-bg: #333333;
            --lobby-btn-border: #555555;
            --done-btn-bg: #c0392b; /* 紅色高對比 */
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        #qrcode-container {
            background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 10px;
            margin-bottom: 20px; text-align: center;
        }
        #qrcode-container p { color: #000; font-weight: bold; margin: 5px; font-size: 1rem; }

        h1 { color: var(--accent-yellow); font-size: 2.8rem; margin: 15px 0; text-align: center; }

        #lobby { width: 100%; max-width: 1400px; display: flex; flex-direction: column; align-items: center; }
        
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; width: 100%; padding: 20px; box-sizing: border-box;
        }
        .unit-btn {
            background: var(--lobby-btn-bg); border: 2px solid var(--lobby-btn-border);
            color: #ffffff; font-size: 2.5rem; padding: 50px 15px; border-radius: 15px;
            cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #lesson-area { display: none; width: 100%; max-width: 1400px; flex-direction: column; }
        
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px; width: 100%; padding: 20px; box-sizing: border-box;
        }

        .vocab-card {
            background: var(--card-dark);
            border: 2px solid #444; border-radius: 20px;
            padding: 40px 10px; text-align: center; cursor: pointer;
            position: relative; min-height: 250px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.4s ease;
        }

        .done-btn {
            position: absolute; top: 15px; right: 15px;
            background: var(--done-btn-bg); color: #ffffff; border: 2px solid #ffffff;
            padding: 12px 24px; font-size: 1.5rem; border-radius: 12px; cursor: pointer;
            z-index: 10;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .back-btn {
            background: #444; color: white; border: 2px solid #666;
            padding: 15px 35px; font-size: 1.6rem; border-radius: 10px;
            margin-bottom: 25px; cursor: pointer; margin-left: 20px;
        }

        .emoji { font-size: 6rem; margin-bottom: 15px; pointer-events: none; }
        .word { font-size: 4.5rem; font-weight: bold; color: var(--accent-yellow); pointer-events: none; }

        @media (max-width: 800px) {
            .lobby-grid, .vocab-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="qrcode-container">
        <p>📱 掃描開始學習</p>
        <div id="qrcode"></div>
    </div>

    <div id="lobby">
        <h1 class="lobby-title">📚 課文自學大廳</h1>
        <div class="lobby-grid" id="lobby-btns"></div>
    </div>

    <div id="lesson-area">
        <button class="back-btn" onclick="goBack()">🏠 回大廳</button>
        <h1 id="lesson-title">課文標題</h1>
        <div class="vocab-grid" id="vocab-grid"></div>
    </div>

    <script>
        const lessons = {
            1: { title: "第一課：風中騎士", data: [{ word: "矛盾", emoji: "🛡️" }, { word: "娛樂", emoji: "🎡" }, { word: "帥", emoji: "😎" }, { word: "摔跤", emoji: "💥" }, { word: "厚", emoji: "📚" }, { word: "提供", emoji: "🤲" }, { word: "諄諄教誨", emoji: "👨‍🏫", tts: "諄諄教繪" }, { word: "竅門", emoji: "🔑" }, { word: "呼嘯", emoji: "🌬️" }, { word: "叮嚀", emoji: "🗣️" }, { word: "廟", emoji: "⛩️" }, { word: "尿尿", emoji: "🚽" }, { word: "煞車", emoji: "🛑", tts: "沙車" }, { word: "霎時", emoji: "⚡" }, { word: "疤", emoji: "🩹" }, { word: "尿臊味", emoji: "👃", tts: "尿騷味" }] },
            2: { title: "第二課：達駭黑熊", data: [{ word: "獵人", emoji: "🏹" }, { word: "尚未", emoji: "⏳" }, { word: "包括", emoji: "📦" }, { word: "糞便", emoji: "💩" }, { word: "獵寮", emoji: "⛺", tts: "獵聊" }, { word: "狩獵", emoji: "🐺" }, { word: "逼迫", emoji: "😖" }, { word: "威脅", emoji: "😨" }, { word: "殺害", emoji: "❌" }, { word: "遵照", emoji: "🫡" }, { word: "骸骨", emoji: "💀", tts: "孩骨" }, { word: "窩在", emoji: "🧶" }, { word: "杉木", emoji: "🌲" }, { word: "小心翼翼", emoji: "🤫" }, { word: "奄奄一息", emoji: "🥀" }] },
            3: { title: "第三課：楊氏之子", data: [{ word: "楊梅", emoji: "🍒" }, { word: "選", emoji: "🗳️" }, { word: "軼聞", emoji: "📖", tts: "易聞" }, { word: "膾炙人口", emoji: "🌟", tts: "快炙人口" }, { word: "古典文學", emoji: "📜" }, { word: "寓意", emoji: "💡" }, { word: "邏輯", emoji: "🧠" }, { word: "例子", emoji: "📝" }, { word: "敏捷", emoji: "🏃" }] },
            4: { title: "第四課：談夢想", data: [{ word: "蜿蜒", emoji: "〰️" }, { word: "荊棘", emoji: "🌵" }, { word: "嚮往", emoji: "💭" }, { word: "逐夢", emoji: "🏃‍♂️" }, { word: "步伐", emoji: "👣", tts: "步發" }, { word: "領域", emoji: "🏗️" }, { word: "楷模", emoji: "🏆" }, { word: "遺憾", emoji: "😞" }, { word: "岔口", emoji: "🛤️" }, { word: "契機", emoji: "✨" }, { word: "名聞遐邇", emoji: "🌏" }, { word: "奠定", emoji: "🧱" }, { word: "屹立不搖", emoji: "🗼" }, { word: "氣餒", emoji: "📉" }, { word: "猶豫", emoji: "🤔" }] },
            5: { title: "第五課：蒂烈娜", data: [{ word: "山巒", emoji: "⛰️" }, { word: "尾鰭", emoji: "🐟" }, { word: "堅韌", emoji: "🦾" }, { word: "鞭子", emoji: "➰" }, { word: "蒼黑", emoji: "⬛" }, { word: "鯝魚", emoji: "🐟" }, { word: "恰巧", emoji: "📍" }, { word: "不偏不倚", emoji: "🎯", tts: "不偏不乙" }, { word: "頸子", emoji: "🦒" }, { word: "強勁", emoji: "💨" }, { word: "洶湧", emoji: "🌊" }, { word: "急湍", emoji: "🏞️" }, { word: "兇猛", emoji: "🐯" }] },
            6: { title: "第六課：不怕", data: [{ word: "來賓", emoji: "🕴️" }, { word: "紐約", emoji: "🗽" }, { word: "百老匯", emoji: "🎭", tts: "百老繪" }, { word: "遙不可及", emoji: "🔭" }, { word: "遠赴", emoji: "✈️" }, { word: "暗自竊喜", emoji: "🤭" }, { word: "查好", emoji: "🔍" }, { word: "葡萄乾", emoji: "🍇" }, { word: "忐忑", emoji: "💓" }, { word: "按住", emoji: "✋" }, { word: "愚蠢", emoji: "🦉" }, { word: "犯錯", emoji: "⚠️" }, { word: "憤恨", emoji: "💢" }, { word: "生涯", emoji: "🛤️" }, { word: "淘汰", emoji: "🗑️" }] },
            7: { title: "第七課：打開心中的窗", data: [{ word: "心扉", emoji: "🚪" }, { word: "狹小", emoji: "🤏" }, { word: "寂寞", emoji: "🌑" }, { word: "疏離", emoji: "↔️", tts: "書離" }, { word: "活潑", emoji: "🏃‍♀️" }, { word: "憐愛", emoji: "🥺" }, { word: "循規蹈矩", emoji: "📏" }, { word: "熟稔", emoji: "🤝" }, { word: "蝸牛", emoji: "🐌" }, { word: "戰戰兢兢", emoji: "😨" }, { word: "攀談", emoji: "💬" }, { word: "繭", emoji: "🐛" }, { word: "誠懇", emoji: "🙏" }, { word: "敦厚", emoji: "🧱" }, { word: "咀嚼", emoji: "👄", tts: "舉覺" }, { word: "殷勤", emoji: "🐝" }, { word: "彌足珍貴", emoji: "💎" }] },
            8: { title: "第八課：努力愛春華", data: [{ word: "權力", emoji: "👑" }, { word: "糾察隊", emoji: "👮", tts: "究察隊" }, { word: "德行", emoji: "✨" }, { word: "忌諱", emoji: "🤫" }, { word: "鳳凰樹", emoji: "🌳" }, { word: "驪歌", emoji: "🎶" }, { word: "藏伏", emoji: "🕵️", tts: "臟服" }, { word: "邋遢", emoji: "👕" }, { word: "不拘小節", emoji: "🌊" }, { word: "出言不遜", emoji: "😡" }, { word: "紀念冊", emoji: "📒" }, { word: "摯友", emoji: "👫" }, { word: "討厭", emoji: "👎" }, { word: "波濤", emoji: "🌊" }, { word: "迴盪", emoji: "🔔" }, { word: "叮囑", emoji: "🗣️" }] },
            9: { title: "第九課：小路", data: [{ word: "蔚藍", emoji: "🟦" }, { word: "忠誠", emoji: "🐕" }, { word: "夥伴", emoji: "🤝" }, { word: "門檻", emoji: "🚪" }, { word: "蒲公英", emoji: "🌼" }, { word: "空曠", emoji: "🏞️" }, { word: "綺夢", emoji: "🌈" }, { word: "誦讀", emoji: "📖" }] }
        };

        const unitNames = ["風中騎士", "達駭黑熊", "楊氏之子", "談夢想", "蒂烈娜", "不怕", "打開心中的窗", "努力愛春華", "每一條小路"];

        const lobbyBtns = document.getElementById('lobby-btns');
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('div');
            btn.className = 'unit-btn';
            btn.innerHTML = `第 ${i} 課<br><small>${unitNames[i-1]}</small>`;
            btn.onclick = () => lessons[i] && lessons[i].data.length ? loadLesson(i) : alert('內容開發中');
            lobbyBtns.appendChild(btn);
        }

        function loadLesson(id) {
            const lesson = lessons[id];
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('lesson-area').style.display = 'flex';
            document.getElementById('lesson-title').innerText = lesson.title;
            const container = document.getElementById('vocab-grid');
            container.innerHTML = '';

            lesson.data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'vocab-card';
                card.id = `card-${id}-${index}`;
                card.onclick = (e) => {
                    if (e.target.className !== 'done-btn') speak(item.tts || item.word);
                };
                card.innerHTML = `<button class="done-btn" onclick="removeCard('${card.id}')">我會了</button><div class="emoji">${item.emoji}</div><div class="word">${item.word}</div>`;
                container.appendChild(card);
            });
            speak(lesson.title);
        }

        function removeCard(id) {
            const card = document.getElementById(id);
            card.style.opacity = '0';
            setTimeout(() => card.remove(), 400);
            speak("學會了");
        }

        function goBack() {
            document.getElementById('lobby').style.display = 'flex';
            document.getElementById('lesson-area').style.display = 'none';
            window.speechSynthesis.cancel();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.65;
            window.speechSynthesis.speak(utterance);
        }

        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 100, height: 100 });
    </script>
</body>
</html>
