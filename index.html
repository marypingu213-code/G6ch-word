<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生字自學大廳 - 視障友善版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #000000; /* 全黑背景增加對比 */
            --card-dark: #1e1e1e;
            --accent-yellow: #ffff00; /* 高亮黃 */
            --lab-bg: #121212;
            --nav-bg: #333333;
            --radical-color: #ffffff;
            --base-text: #00ff00; /* 亮綠色區分部件 */
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 大廳樣式保持原本規模但字體加大 */
        #lobby { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .lobby-title { color: var(--accent-yellow); font-size: 4rem; margin: 30px 0; }
        .lobby-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; width: 95%; }
        .unit-btn { background: #222; border: 4px solid #555; color: white; font-size: 3rem; padding: 60px 20px; border-radius: 20px; cursor: pointer; text-align: center; }
        .lab-btn { border-color: #3498db; background: #001a33; }

        /* --- 視障友善實驗室專用樣式 --- */
        #lab-area { display: none; width: 100%; min-height: 100vh; background-color: var(--lab-bg); flex-direction: column; }
        .lab-nav { display: flex; justify-content: center; gap: 10px; padding: 15px; background: var(--nav-bg); flex-wrap: wrap; }
        .nav-btn { padding: 15px 25px; font-size: 24px; border-radius: 12px; border: 2px solid #fff; background: #000; color: white; cursor: pointer; }
        .nav-btn.active { background: var(--accent-yellow); color: #000; font-weight: bold; }

        #combine-zone { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 10px; }
        
        /* 放大結果顯示 */
        #result-display { font-size: 200px; font-weight: 900; color: var(--accent-yellow); margin: 20px 0; line-height: 1; }
        #result-emoji { font-size: 100px; height: 110px; }

        /* 放大合體框 */
        .slot-container { display: flex; align-items: center; gap: 30px; margin: 30px 0; }
        .slot {
            width: 200px; height: 200px; border: 6px dashed #888; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 100px; font-weight: bold; color: #888; background: #000;
        }
        .slot.filled { border-style: solid; border-color: #fff; color: #fff; }
        .slot.base-fixed { border-style: solid; border-color: var(--base-text); color: var(--base-text); }

        #info-bar { font-size: 36px; font-weight: bold; color: #ffffff; background: #333; padding: 20px; border-radius: 15px; width: 80%; text-align: center; margin-top: 20px; }

        /* 底部按鈕區加大 */
        .selection-area { background: #222; padding: 30px; border-top: 5px solid #444; width: 100%; box-sizing: border-box; }
        #radical-btns { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
        .part-btn { 
            width: 120px; height: 120px; font-size: 60px; font-weight: bold; 
            background: #000; color: #fff; border: 4px solid var(--accent-yellow); 
            border-radius: 20px; cursor: pointer; 
        }
        .part-btn:active { background: var(--accent-yellow); color: #000; }

        .back-btn { background: #d32f2f; color: white; padding: 20px 40px; font-size: 2.5rem; border-radius: 15px; margin: 20px; border: none; cursor: pointer; font-weight: bold; }
        
        #qrcode-container { display: none; } /* 視障模式建議隱藏 QR Code 節省空間 */
    </style>
</head>
<body>

    <div id="lobby">
        <h1 class="lobby-title">📚 課文自學大廳</h1>
        <div class="lobby-grid">
            <div class="unit-btn lab-btn" onclick="openLab()">🧪 文字合體<br>實驗室</div>
            <div class="unit-btn" onclick="loadLesson(1)">第一課<br>風中騎士</div>
            <div class="unit-btn" onclick="loadLesson(2)">第二課<br>達駭黑熊</div>
            <div class="unit-btn" onclick="loadLesson(3)">第三課<br>楊氏之子</div>
            <div class="unit-btn" onclick="loadLesson(4)">第四課<br>談夢想</div>
            <div class="unit-btn" onclick="loadLesson(5)">第五課<br>蒂烈娜</div>
        </div>
    </div>

    <div id="lab-area">
        <button class="back-btn" onclick="goBack()">🏠 回大廳</button>
        <nav class="lab-nav">
            <button id="nav-mei" class="nav-btn" onclick="switchLevel('mei')">每 系列</button>
            <button id="nav-qing" class="nav-btn" onclick="switchLevel('qing')">青 系列</button>
            <button id="nav-guo" class="nav-btn" onclick="switchLevel('guo')">過 系列</button>
            <button id="nav-ba" class="nav-btn" onclick="switchLevel('ba')">巴 系列</button>
            <button id="nav-dui" class="nav-btn" onclick="switchLevel('dui')">兌 系列</button>
            <button id="nav-zhui" class="nav-btn" onclick="switchLevel('zhui')">隹 系列</button>
        </nav>
        <div id="combine-zone">
            <div id="result-emoji"></div>
            <div id="result-display"></div>
            <div class="slot-container">
                <div id="slot-radical" class="slot">部</div>
                <div style="font-size: 60px; color: #fff;">+</div>
                <div id="slot-base" class="slot base-fixed">?</div>
            </div>
            <div id="info-bar">點選下方的部首</div>
        </div>
        <div class="selection-area">
            <div id="radical-btns"></div>
            <button onclick="clearRadical()" style="width:100%; padding:25px; margin-top:20px; border-radius:15px; font-size:30px; background:#555; color:white; border:none;">🔄 清除重選</button>
        </div>
    </div>

    <div id="lesson-area" style="display:none; background:#000; width:100%;">
        <button class="back-btn" onclick="goBack()">🏠 回大廳</button>
        <h1 id="lesson-title" style="text-align:center; color:var(--accent-yellow); font-size:4rem;"></h1>
        <div id="vocab-grid" style="display:grid; grid-template-columns:1fr; gap:20px; padding:20px;"></div>
    </div>

    <script>
        // 資料物件與功能邏輯 (與先前版本一致，僅調整 UI 呈現)
        const lessons = { 1: { title: "第一課", data: [{ word: "矛盾", emoji: "🛡️" }] } }; // 範例，請補齊
        const labLevels = {
            mei: { title: "每", base: "每", results: { "氵": { char: "海", emo: "🌊", msg: "大海的海" }, "忄": { char: "悔", emo: "😢", msg: "後悔的悔" }, "艹": { char: "莓", emo: "🍓", msg: "草莓的莓" }, "木": { char: "梅", emo: "🌸", msg: "梅花的梅" } } },
            qing: { title: "青", base: "青", results: { "氵": { char: "清", emo: "🥤", msg: "清水的清" }, "忄": { char: "情", emo: "❤️", msg: "心情的情" }, "日": { char: "晴", emo: "☀️", msg: "晴天的晴" }, "目": { char: "睛", emo: "👀", msg: "眼睛的睛" }, "言": { char: "請", emo: "🙏", msg: "請問的請" }, "犭": { char: "猜", emo: "❓", msg: "猜一猜的猜" } } },
            guo: { title: "過", base: "咼", results: { "辶": { char: "過", emo: "🏃", msg: "路過的過" }, "穴": { char: "窩", emo: "🪺", msg: "鳥窩的窩" }, "釒": { char: "鍋", emo: "🍲", msg: "火鍋的鍋" } } },
            ba: { title: "巴", base: "巴", results: { "父": { char: "爸", emo: "👨", msg: "爸爸的爸" }, "口": { char: "吧", emo: "💬", msg: "好吧的吧" }, "扌": { char: "把", emo: "🖐️", msg: "拿東西的把" }, "⺼": { char: "肥", emo: "🐷", msg: "肥肉的肥" } } },
            dui: { title: "兌", base: "兌", results: { "言": { char: "說", emo: "🗣️", msg: "說話的說" }, "忄": { char: "悅", emo: "🥰", msg: "開心的悅" }, "⺼": { char: "脫", emo: "👕", msg: "脫衣服的脫" }, "釒": { char: "銳", emo: "🔪", msg: "尖銳的銳" } } },
            zhui: { title: "隹", base: "隹", results: { "扌": { char: "推", emo: "👐", msg: "推門的推" }, "土": { char: "堆", emo: "⛰️", msg: "土堆、堆積的堆" }, "言": { char: "誰", emo: "🤔", msg: "你是誰的誰" }, "糹": { char: "維", emo: "🧬", msg: "維護、纖維的維" }, "辶": { char: "進", emo: "🚪", msg: "進門、前進的進" } } }
        };

        function goBack() { 
            document.getElementById('lobby').style.display = 'flex'; 
            document.getElementById('lab-area').style.display = 'none'; 
            document.getElementById('lesson-area').style.display = 'none';
        }
        function openLab() { 
            document.getElementById('lobby').style.display = 'none'; 
            document.getElementById('lab-area').style.display = 'flex'; 
            switchLevel('mei'); 
        }
        function switchLevel(key) {
            currentLabKey = key;
            const data = labLevels[key];
            document.getElementById('slot-base').innerText = data.base;
            const btnArea = document.getElementById('radical-btns');
            btnArea.innerHTML = Object.keys(data.results).map(r => `<button class="part-btn" onclick="selectRadical('${r}')">${r}</button>`).join('');
            clearRadical();
            speak("切換到" + data.title + "系列");
        }
        function selectRadical(r) {
            const res = labLevels[currentLabKey].results[r];
            document.getElementById('slot-radical').innerText = r;
            document.getElementById('slot-radical').classList.add('filled');
            document.getElementById('result-display').innerText = res.char;
            document.getElementById('result-emoji').innerText = res.emo;
            document.getElementById('info-bar').innerText = res.msg;
            speak(r + "加" + labLevels[currentLabKey].base + "，變成" + res.char + "。" + res.msg);
        }
        function clearRadical() {
            document.getElementById('slot-radical').innerText = "部";
            document.getElementById('result-display').innerText = "";
            document.getElementById('result-emoji').innerText = "";
            document.getElementById('info-bar').innerText = "點選下方的部首";
        }
        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='zh-TW'; u.rate=0.7; window.speechSynthesis.speak(u); }
    </script>
</body>
</html>
